<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shop Admin{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background-color: var(--card-bg);
            border-right: 1px solid var(--border);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: var(--primary);
            text-align: center;
        }

        .sidebar a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            transition: all 0.3s;
        }

        .sidebar a:hover, .sidebar a.active {
            background-color: var(--primary);
            color: white;
        }

        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        h1 { font-weight: 600; margin-top: 0; }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--secondary); }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        th { color: var(--text-muted); font-weight: 400; }

        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-success { background-color: #14532d; color: #4ade80; }
        .badge-pending { background-color: #713f12; color: #fbbf24; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="sidebar">
        <h2>SHOP ADMIN</h2>
        <a href="/admin/dashboard" class="{% if active_page == 'dashboard' %}active{% endif %}">📊 Dashboard</a>
        <a href="/admin/categories" class="{% if active_page == 'categories' %}active{% endif %}">📁 Danh Mục</a>
        <a href="/admin/products" class="{% if active_page == 'products' %}active{% endif %}">📦 Sản Phẩm</a>
        <a href="/admin/accounts" class="{% if active_page == 'accounts' %}active{% endif %}">🔑 Tài Khoản</a>
        <a href="/admin/orders" class="{% if active_page == 'orders' %}active{% endif %}">🛒 Đơn Hàng</a>
        <a href="/admin/vouchers" class="{% if active_page == 'vouchers' %}active{% endif %}">🎟️ Voucher</a>
        <a href="/admin/broadcast" class="{% if active_page == 'broadcast' %}active{% endif %}">📢 Gửi thông báo</a>
        <a href="/admin/users" class="{% if active_page == 'users' %}active{% endif %}">👥 Người Dùng</a>
        <a href="/admin/settings" class="{% if active_page == 'settings' %}active{% endif %}">⚙️ Cấu hình</a>
        <div style="margin-top: auto; padding: 1rem;">
            <a href="/logout" style="color: var(--danger)">🚪 Đăng Xuất</a>
        </div>
    </div>
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
